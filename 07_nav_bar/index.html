<!DOCTYPE html>
<html>
<head>
  <title>Navigation Bar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; }
    nav { background: #333; display: flex; align-items: center; padding: 0 20px; flex-wrap: wrap; }
    nav .logo { color: white; font-size: 22px; font-weight: bold; padding: 15px 0; margin-right: 30px; }
    nav ul { list-style: none; display: flex; flex-wrap: wrap; }
    nav ul li { position: relative; }
    nav ul li a { display: block; color: white; text-decoration: none; padding: 15px 18px; }
    nav ul li a:hover { background: #555; }
    .dropdown { display: none; position: absolute; background: #444; min-width: 150px; top: 100%; left: 0; z-index: 10; }
    .dropdown li a { padding: 10px 15px; }
    nav ul li:hover .dropdown { display: block; }
    .content { padding: 40px; }
    @media(max-width: 600px) { nav ul { flex-direction: column; width: 100%; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MyWebsite</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li>
        <a href="#">Services ▾</a>
        <ul class="dropdown">
          <li><a href="#">Web Design</a></li>
          <li><a href="#">Development</a></li>
          <li><a href="#">SEO</a></li>
        </ul>
      </li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <div class="content">
    <h2>Welcome!</h2>
    <p>Hover over "Services" to see the dropdown menu.</p>
  </div>
</body>
</html>
