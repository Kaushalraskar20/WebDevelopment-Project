<!DOCTYPE html>
<html>
<head>
  <title>Pie / Doughnut Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; padding: 30px; text-align: center; }
    .charts { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; margin-top: 20px; }
    canvas { max-width: 280px; }
  </style>
</head>
<body>
  <h2>Attendance Distribution</h2>
  <div class="charts">
    <div>
      <h3>Pie Chart</h3>
      <canvas id="pieChart"></canvas>
    </div>
    <div>
      <h3>Doughnut Chart</h3>
      <canvas id="doughnutChart"></canvas>
    </div>
  </div>
  <script>
    var data = {
      labels: ["Present", "Absent", "Leave"],
      datasets: [{
        data: [75, 15, 10],
        backgroundColor: ["#4CAF50", "#e44", "#FF9800"],
        borderWidth: 1
      }]
    };

    new Chart(document.getElementById("pieChart"), { type: "pie", data: data });
    new Chart(document.getElementById("doughnutChart"), { type: "doughnut", data: data });
  </script>
</body>
</html>
