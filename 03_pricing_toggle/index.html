<!DOCTYPE html>
<html>
<head>
  <title>Pricing Toggle</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    .toggle-btn { padding: 10px 25px; margin: 5px; cursor: pointer; border: 2px solid #4CAF50; background: white; border-radius: 5px; font-size: 16px; }
    .toggle-btn.active { background: #4CAF50; color: white; }
    .plans { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
    .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 180px; }
    .price { font-size: 28px; font-weight: bold; color: #4CAF50; }
    .plan-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h2>Pricing Plans</h2>
  <button class="toggle-btn active" onclick="setPlan('monthly', this)">Monthly</button>
  <button class="toggle-btn" onclick="setPlan('yearly', this)">Yearly</button>

  <div class="plans">
    <div class="card">
      <div class="plan-name">Basic</div>
      <div class="price" id="basic">$9</div>
      <p>5 Projects</p>
    </div>
    <div class="card">
      <div class="plan-name">Pro</div>
      <div class="price" id="pro">$19</div>
      <p>20 Projects</p>
    </div>
    <div class="card">
      <div class="plan-name">Premium</div>
      <div class="price" id="premium">$49</div>
      <p>Unlimited</p>
    </div>
  </div>

  <script>
    var prices = {
      monthly: { basic: "$9", pro: "$19", premium: "$49" },
      yearly:  { basic: "$89", pro: "$179", premium: "$459" }
    };

    function setPlan(plan, btn) {
      document.getElementById("basic").innerText = prices[plan].basic;
      document.getElementById("pro").innerText = prices[plan].pro;
      document.getElementById("premium").innerText = prices[plan].premium;
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
  </script>
</body>
</html>
