<!DOCTYPE html>
<html>
<head>
  <title>To-Do List</title>
  <style>
    body { font-family: Arial; padding: 30px; max-width: 450px; margin: auto; }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }
    button.add { padding: 10px 18px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f5f5f5; border-radius: 5px; margin-bottom: 8px; }
    li button { background: #e44; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .done { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>
  <h2>To-Do List</h2>
  <div class="input-row">
    <input type="text" id="task" placeholder="Enter a task..." onkeydown="if(event.key==='Enter')addTask()">
    <button class="add" onclick="addTask()">Add</button>
  </div>
  <ul id="list"></ul>
  <script>
    function addTask() {
      var val = document.getElementById("task").value.trim();
      if (!val) return;
      var li = document.createElement("li");
      li.innerHTML = `<span onclick="this.classList.toggle('done')">${val}</span><button onclick="this.parentElement.remove()">Delete</button>`;
      document.getElementById("list").appendChild(li);
      document.getElementById("task").value = "";
    }
  </script>
</body>
</html>
