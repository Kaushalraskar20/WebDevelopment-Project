<!DOCTYPE html>
<html>
<head>
  <title>String Operations</title>
  <style>
    body { font-family: Arial; padding: 30px; max-width: 500px; }
    textarea { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    button { padding: 10px 16px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    button:hover { background: #388E3C; }
    #output { background: #f5f5f5; padding: 15px; border-radius: 5px; min-height: 50px; font-size: 15px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>String Operations</h2>
  <textarea id="input" rows="3" placeholder="Type something here..."></textarea>
  <div class="btns">
    <button onclick="op('reverse')">Reverse</button>
    <button onclick="op('upper')">UPPERCASE</button>
    <button onclick="op('lower')">lowercase</button>
    <button onclick="op('length')">Length</button>
    <button onclick="op('words')">Word Count</button>
    <button onclick="op('trim')">Trim Spaces</button>
  </div>
  <strong>Output:</strong>
  <div id="output">Result will appear here...</div>
  <script>
    function op(type) {
      var str = document.getElementById("input").value;
      var result;
      if      (type === "reverse") result = str.split("").reverse().join("");
      else if (type === "upper")   result = str.toUpperCase();
      else if (type === "lower")   result = str.toLowerCase();
      else if (type === "length")  result = "Length: " + str.length + " characters";
      else if (type === "words")   result = "Words: " + (str.trim() ? str.trim().split(/\s+/).length : 0);
      else if (type === "trim")    result = str.trim();
      document.getElementById("output").innerText = result;
    }
  </script>
</body>
</html>
