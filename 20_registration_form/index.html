<!DOCTYPE html>
<html>
<head>
  <title>Student Registration Form</title>
  <style>
    body { font-family: Arial; padding: 30px; background: #f0f4f8; }
    .form-box { background: white; max-width: 480px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #4CAF50; margin-bottom: 20px; }
    label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 9px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
    .radio-group { display: flex; gap: 20px; margin-top: 8px; }
    button { width: 100%; margin-top: 20px; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #388E3C; }
    #msg { text-align: center; margin-top: 10px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Student Registration</h2>
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name">

    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label>Gender</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="Male"> Male</label>
      <label><input type="radio" name="gender" value="Female"> Female</label>
      <label><input type="radio" name="gender" value="Other"> Other</label>
    </div>

    <label>Course</label>
    <select id="course">
      <option value="">-- Select Course --</option>
      <option>B.Sc. Computer Science</option>
      <option>B.E. Computer Engineering</option>
      <option>BCA</option>
      <option>MCA</option>
    </select>

    <label>Address</label>
    <textarea id="address" rows="3" placeholder="Enter your address"></textarea>

    <button onclick="register()">Register</button>
    <div id="msg"></div>
  </div>
  <script>
    function register() {
      var name  = document.getElementById("name").value.trim();
      var email = document.getElementById("email").value.trim();
      var gender = document.querySelector('input[name="gender"]:checked');
      var course = document.getElementById("course").value;
      if (!name || !email || !gender || !course) {
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Please fill all fields!";
        return;
      }
      document.getElementById("msg").style.color = "green";
      document.getElementById("msg").innerText = "✅ Registered successfully! Welcome, " + name + "!";
    }
  </script>
</body>
</html>
