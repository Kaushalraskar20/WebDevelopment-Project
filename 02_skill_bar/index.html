<!DOCTYPE html>
<html>
<head>
  <title>Skill Bar Component</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; }
    .skill { margin-bottom: 15px; }
    .skill-name { margin-bottom: 5px; font-weight: bold; }
    .bar-bg { background: #ddd; border-radius: 10px; height: 20px; }
    .bar-fill { background: #4CAF50; height: 20px; border-radius: 10px; transition: width 1s; }
    .percent { float: right; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h2>My Skills</h2>
  <div id="skills"></div>
  <script>
    var skills = [
      { name: "HTML", percent: 90 },
      { name: "CSS", percent: 75 },
      { name: "JavaScript", percent: 60 },
      { name: "Python", percent: 50 },
      { name: "MySQL", percent: 40 }
    ];

    var container = document.getElementById("skills");
    skills.forEach(function(skill) {
      container.innerHTML += `
        <div class="skill">
          <div class="skill-name">${skill.name} <span class="percent">${skill.percent}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${skill.percent}%"></div></div>
        </div>`;
    });
  </script>
</body>
</html>
