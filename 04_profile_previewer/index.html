<!DOCTYPE html>
<html>
<head>
  <title>Profile Previewer</title>
  <style>
    body { font-family: Arial; padding: 20px; display: flex; gap: 40px; flex-wrap: wrap; }
    input, textarea { display: block; width: 250px; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
    .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 220px; text-align: center; background: #f9f9f9; }
    .card img { width: 80px; height: 80px; border-radius: 50%; background: #ddd; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #4CAF50; color: white; font-size: 32px; display: flex; align-items: center; justify-content: center; margin: auto; }
  </style>
</head>
<body>
  <div>
    <h3>Enter Details</h3>
    <input type="text" id="name" placeholder="Full Name" oninput="update()">
    <input type="text" id="job" placeholder="Job Title" oninput="update()">
    <input type="email" id="email" placeholder="Email" oninput="update()">
    <textarea id="bio" placeholder="Short Bio" oninput="update()"></textarea>
  </div>

  <div>
    <h3>Live Preview</h3>
    <div class="card">
      <div class="avatar" id="avatar">?</div>
      <h3 id="pName">Your Name</h3>
      <p id="pJob" style="color:#888">Job Title</p>
      <p id="pEmail" style="font-size:13px">email@example.com</p>
      <p id="pBio" style="font-size:13px">Your bio will appear here.</p>
    </div>
  </div>

  <script>
    function update() {
      var name = document.getElementById("name").value || "Your Name";
      var job  = document.getElementById("job").value  || "Job Title";
      var email= document.getElementById("email").value|| "email@example.com";
      var bio  = document.getElementById("bio").value  || "Your bio will appear here.";
      document.getElementById("pName").innerText  = name;
      document.getElementById("pJob").innerText   = job;
      document.getElementById("pEmail").innerText = email;
      document.getElementById("pBio").innerText   = bio;
      document.getElementById("avatar").innerText = name.charAt(0).toUpperCase() || "?";
    }
  </script>
</body>
</html>
