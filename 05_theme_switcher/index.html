<!DOCTYPE html>
<html>
<head>
  <title>Theme Switcher</title>
  <style>
    body { font-family: Arial; padding: 40px; transition: all 0.3s; }
    body.dark { background: #222; color: white; }
    body.light { background: #fff; color: #222; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
    body.dark button { background: #555; color: white; }
    body.light button { background: #eee; color: #222; }
    .box { margin-top: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body class="light">
  <h2 id="heading">🌞 Light Mode</h2>
  <button onclick="toggleTheme()">Toggle Theme</button>
  <div class="box">
    <p>This is sample content. Toggle the button to switch between Light and Dark mode.</p>
    <p>Your preference is saved using localStorage!</p>
  </div>
  <script>
    // Load saved preference
    var saved = localStorage.getItem("theme") || "light";
    applyTheme(saved);

    function toggleTheme() {
      var current = document.body.classList.contains("dark") ? "dark" : "light";
      var next = current === "dark" ? "light" : "dark";
      applyTheme(next);
      localStorage.setItem("theme", next);
    }

    function applyTheme(theme) {
      document.body.className = theme;
      document.getElementById("heading").innerText = theme === "dark" ? "🌙 Dark Mode" : "🌞 Light Mode";
    }
  </script>
</body>
</html>
