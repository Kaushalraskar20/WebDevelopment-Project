<!DOCTYPE html>
<html>
<head>
  <title>Product Gallery</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .gallery { display: flex; flex-wrap: wrap; gap: 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; width: 180px; text-align: center; }
    .card img { width: 100px; height: 100px; object-fit: contain; }
    .price { color: #e44; font-size: 18px; font-weight: bold; }
    button { margin-top: 10px; padding: 8px 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #388E3C; }
    #msg { color: green; font-weight: bold; margin-top: 15px; }
  </style>
</head>
<body>
  <h2>Product Gallery</h2>
  <div class="gallery" id="gallery"></div>
  <p id="msg"></p>
  <script>
    var products = [
      { name: "Laptop",    price: 45000, emoji: "💻" },
      { name: "Phone",     price: 15000, emoji: "📱" },
      { name: "Headphones",price: 2000,  emoji: "🎧" },
      { name: "Keyboard",  price: 1500,  emoji: "⌨️" },
      { name: "Mouse",     price: 800,   emoji: "🖱️" },
      { name: "Monitor",   price: 12000, emoji: "🖥️" }
    ];

    var gallery = document.getElementById("gallery");
    products.forEach(function(p) {
      gallery.innerHTML += `
        <div class="card">
          <div style="font-size:60px">${p.emoji}</div>
          <h4>${p.name}</h4>
          <div class="price">₹${p.price}</div>
          <button onclick="buy('${p.name}')">Buy Now</button>
        </div>`;
    });

    function buy(name) {
      document.getElementById("msg").innerText = "✅ " + name + " added to cart!";
    }
  </script>
</body>
</html>
